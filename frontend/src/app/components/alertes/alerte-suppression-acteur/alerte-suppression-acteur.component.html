<h2 mat-dialog-title>Supprimer l'acteur</h2>

<mat-dialog-content>
  <p class="alerte-suppression-acteur-message">{{ confirmationMessage }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="accent" type="button" (click)="close()">
    {{ labels.cancel }}
  </button>
  <button mat-raised-button color="warn" type="button" (click)="deleteActor()">
    {{ deleteButtonLabel }}
  </button>
</mat-dialog-actions>
